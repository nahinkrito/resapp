<!DOCTYPE html>
<html>
<head>
<title>Async Result Scanner</title>
<style>
body { font-family: Arial; padding:20px }
input { margin:5px; padding:6px }
button { margin:5px; padding:8px }
.progress { width:100%; background:#ddd; height:25px }
.bar { height:100%; width:0%; background:green }
</style>
</head>
<body>

<h2>Result Scanner</h2>

<div id="prefix-container">
    <input class="prefix" placeholder="Prefix">
</div>
<button onclick="addPrefix()">+</button>

<br>
<input id="start" placeholder="Start">
<input id="end" placeholder="End">
<input id="delay" placeholder="Delay (seconds)" value="0.5">
<input id="target" placeholder="Target Name">

<br><br>

<button onclick="start()">Start</button>
<button onclick="pause()">Pause</button>
<button onclick="resume()">Resume</button>
<button onclick="stop()">Stop</button>

<h3>Progress</h3>
<div class="progress">
    <div class="bar" id="bar"></div>
</div>

<p>Last Checked: <span id="current"></span></p>
<p>Checked: <span id="checked"></span></p>

<h3>Matches</h3>
<ul id="matches"></ul>

<script>
function addPrefix(){
    let input = document.createElement("input");
    input.className="prefix";
    input.placeholder="Prefix";
    document.getElementById("prefix-container").appendChild(input);
}

async function start(){
    let prefixes = Array.from(document.getElementsByClassName("prefix")).map(i=>i.value);
    await fetch("/start", {
        method:"POST",
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
            prefixes: prefixes,
            start: document.getElementById("start").value,
            end: document.getElementById("end").value,
            delay: document.getElementById("delay").value,
            target_name: document.getElementById("target").value
        })
    });
}

async function pause(){ await fetch("/pause",{method:"POST"}) }
async function resume(){ await fetch("/resume",{method:"POST"}) }
async function stop(){ await fetch("/stop",{method:"POST"}) }

async function update(){
    let r = await fetch("/progress");
    let data = await r.json();

    document.getElementById("current").innerText = data.current;
    document.getElementById("checked").innerText = data.checked;

    let percent = (data.checked/data.total)*100 || 0;
    document.getElementById("bar").style.width = percent+"%";

    let matches = document.getElementById("matches");
    matches.innerHTML="";
    data.matches.forEach(m=>{
        let li=document.createElement("li");
        li.innerText=m.reg_no+" - "+m.name;
        matches.appendChild(li);
    });
}

setInterval(update,1000);
</script>

</body>
</html>
