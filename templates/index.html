<!DOCTYPE html>
<html>
<head>
    <title>Result Search App</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        input, button { padding: 8px; margin: 5px; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
        .match { background-color: #a4fca4; }
    </style>
</head>
<body>

<h2>College Result Search</h2>

<form method="POST">
    <input name="prefixes" placeholder="Prefixes (comma separated)" required>
    <input name="start" type="number" placeholder="Start Number" required>
    <input name="end" type="number" placeholder="End Number" required>
    <input name="target_name" placeholder="Name to Search" required>
    <input name="delay" type="number" step="0.5" placeholder="Delay (seconds)" value="1" required>
    <button type="submit">Search</button>
</form>

{% if results %}
<table>
    <tr>
        <th>Reg No</th>
        <th>Name</th>
        <th>Status</th>
    </tr>
    {% for r in results %}
    <tr class="{{ 'match' if r.status == 'MATCH' else '' }}">
        <td>{{ r.reg_no }}</td>
        <td>{{ r.name }}</td>
        <td>{{ r.status }}</td>
    </tr>
    {% endfor %}
</table>
{% endif %}

</body>
</html>
